<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Page Not Found | Incident Lens</title>
		<style>
			:root {
				color-scheme: light;
				--bg-a: #f7fbff;
				--bg-b: #eef5ff;
				--text: #0f172a;
				--muted: #475569;
				--card: rgba(255, 255, 255, 0.85);
				--border: rgba(148, 163, 184, 0.35);
				--accent: #0284c7;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family: "Segoe UI", "Segoe UI Variable", "Calibri", sans-serif;
				background: radial-gradient(circle at 20% 10%, #dff3ff 0%, transparent 40%),
					linear-gradient(160deg, var(--bg-a), var(--bg-b));
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 24px;
				color: var(--text);
			}

			main {
				max-width: 680px;
				width: 100%;
				padding: 40px 36px;
				background: var(--card);
				border: 1px solid var(--border);
				border-radius: 20px;
				box-shadow: 0 24px 64px rgba(15, 23, 42, 0.12);
				backdrop-filter: blur(6px);
			}

			h1 {
				margin: 0;
				font-size: clamp(1.8rem, 4vw, 2.6rem);
				line-height: 1.1;
			}

			p {
				margin: 14px 0 0;
				font-size: 1rem;
				line-height: 1.65;
				color: var(--muted);
			}

			.badge {
				display: inline-block;
				margin-bottom: 18px;
				padding: 6px 12px;
				border-radius: 999px;
				font-size: 0.75rem;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--accent);
				background: rgba(2, 132, 199, 0.1);
			}

			a {
				display: inline-block;
				margin-top: 24px;
				text-decoration: none;
				font-weight: 600;
				color: white;
				background: var(--accent);
				padding: 10px 16px;
				border-radius: 10px;
			}
		</style>
	</head>
	<body>
		<main>
			<span class="badge">404</span>
			<h1>Page not found</h1>
			<p>
				The page you requested does not exist on Incident Lens.
				If you entered the URL manually, check for typos and try again.
			</p>
			<a href="/">Back to Incident Lens</a>
		</main>
	</body>
</html>
